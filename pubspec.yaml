name: v_keyboard
description: A fully customizable, native-feeling virtual keyboard and text input system for Flutter across mobile, desktop, and web.
version: 0.1.0
repository: https://github.com/tegarnugroho/v_keyboard
issue_tracker: https://github.com/tegarnugroho/v_keyboard/issues
homepage: https://github.com/tegarnugroho/v_keyboard

topics:
  - keyboard
  - virtual-keyboard
  - text-input
  - emoji
  - desktop

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:

platforms:
  android:
  ios:
  linux:
  macos:
  windows:
  web:

screenshots:
  - description: 'Hero — native-feeling virtual keyboard for Flutter.'
    path: assets/showcase/hero.png
  - description: 'Standard mobile keyboard.'
    path: assets/showcase/mobile_standard.png
  - description: 'Emoji panel.'
    path: assets/showcase/mobile_emoji.png
  - description: 'Desktop (Windows OSK style) keyboard.'
    path: assets/showcase/desktop_keyboard.png
